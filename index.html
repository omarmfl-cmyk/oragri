<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrAgri — Login</title>
  <style>
    :root{--accent1:#ff6a00;--accent2:#ff4c86;--shadow:0 28px 80px rgba(0,0,0,.24)}
    *,::before,::after{box-sizing:border-box}
    body{margin:0;font-family:Inter,'Segoe UI',Arial,sans-serif;background:radial-gradient(circle at 50% 35%,#ece7e5 0%,#d6d0cd 42%,#c9c3bf 100%);min-height:100vh;color:#1a1a1a}
    .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .frame{width:min(1260px,100%);min-height:min(780px,92vh);display:grid;grid-template-columns:1fr 1fr;border-radius:34px;overflow:hidden;box-shadow:var(--shadow);background:#fff}
    .left{background:linear-gradient(180deg,#5a4318 0%,#2f220c 100%);position:relative;display:flex;align-items:center;justify-content:center;padding:40px}
    .left::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,236,180,.10),transparent 32%);pointer-events:none}
    .logo-wrap{position:relative;z-index:1;width:min(300px,58vw);display:flex;align-items:center;justify-content:center}
    .logo-wrap img{width:100%;height:auto;display:block}
    .right{background:#fff;padding:42px 48px 30px;display:flex;flex-direction:column;justify-content:space-between}
    .topbar{display:flex;justify-content:flex-end;align-items:center;min-height:34px}
    .switch{display:flex;gap:4px;background:#f3f3f3;padding:4px;border-radius:999px}
    .switch button{border:0;background:transparent;padding:6px 14px;border-radius:999px;font-weight:700;font-size:13px;color:#777;cursor:pointer;transition:background .18s,color .18s,box-shadow .18s}
    .switch button.active{background:#fff;color:#111;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .content{max-width:430px;width:100%;margin:auto 0;padding-top:0}
    .h1{font-size:54px;line-height:.95;letter-spacing:-2px;font-weight:700;margin:0 0 28px;color:#151d2a}
    .field{position:relative;margin-bottom:16px}
    .field input{width:100%;height:54px;border-radius:27px;border:1px solid #ececec;background:#fff;padding:0 20px;font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
    .field input:focus{border-color:#dedede;box-shadow:0 0 0 4px rgba(255,106,0,.07)}
    .eye{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:18px;color:#a1a1a1;cursor:pointer}
    .forgot{font-size:13px;color:#c3783e;margin:2px 0 18px 16px;cursor:pointer;display:inline-block}
    .btn{width:100%;height:48px;border:0;border-radius:24px;background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#fff;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 12px 28px rgba(255,90,59,.24);transition:opacity .15s,transform .1s}
    .btn:hover{opacity:.92;transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}

    /* Message d'erreur */
    .error-msg{display:none;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.25);color:#c0392b;border-radius:14px;padding:10px 18px;font-size:13px;margin-bottom:14px;text-align:center}
    .error-msg.show{display:block}

    .footer{display:flex;justify-content:space-between;align-items:center;margin-top:80px;font-size:12px;color:#9a9a9a}
    .footer .links{display:flex;gap:22px;align-items:center}

    /* RTL */
    [dir="rtl"] .content{text-align:right}
    [dir="rtl"] .forgot{margin-left:0;margin-right:16px}
    [dir="rtl"] .topbar{justify-content:flex-start}
    [dir="rtl"] .field input{direction:rtl}
    [dir="rtl"] .eye{right:auto;left:18px}
    [dir="rtl"] .footer{flex-direction:row-reverse}
    [dir="rtl"] .footer .links{flex-direction:row-reverse}

    @media(max-width:980px){.frame{grid-template-columns:1fr;min-height:auto}.left{min-height:220px}.right{padding:22px 30px 30px}.content{max-width:520px}.h1{font-size:42px}.footer{margin-top:52px}}
    @media(max-width:640px){.page{padding:0}.frame{min-height:100vh;border-radius:0}.left{min-height:170px;padding:26px}.right{padding:18px 18px 26px}.h1{font-size:34px}.field input{height:52px}.btn{height:50px}.footer{margin-top:42px;gap:12px;flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <div class="page">
    <div class="frame">
      <section class="left">
        <div class="logo-wrap">
          <img src="logo.png" alt="OrAgri Logo" />
        </div>
      </section>
      <section class="right">
        <div class="topbar">
          <div class="switch">
            <button data-lang="fr" class="active">FR</button>
            <button data-lang="ar">عربية</button>
          </div>
        </div>
        <div class="content">
          <h1 id="title" class="h1">Connexion</h1>
          <div class="error-msg" id="errorMsg"></div>
          <div class="field">
            <input id="username" type="text" placeholder="Nom d'utilisateur ou email" autocomplete="username" />
          </div>
          <div class="field">
            <input id="password" type="password" placeholder="Mot de passe" autocomplete="current-password" />
            <span class="eye" id="togglePassword" role="button" tabindex="0" aria-label="Afficher le mot de passe">👁</span>
          </div>
          <span class="forgot" id="forgot">Mot de passe oublié ?</span>
          <button class="btn" id="loginBtn">Se connecter</button>
        </div>
        <div class="footer">
          <div>© 2026</div>
          <div class="links">
            <span id="contactTxt">Contact</span>
            <span id="langTxt">Français</span>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const i18n = {
      fr: {
        title: "Connexion",
        username: "Nom d'utilisateur ou email",
        password: "Mot de passe",
        forgot: "Mot de passe oublié ?",
        button: "Se connecter",
        langTxt: "Français",
        contact: "Contact",
        errorEmpty: "Veuillez remplir tous les champs.",
        errorWrong: "Identifiants incorrects. Réessayez."
      },
      ar: {
        title: "تسجيل الدخول",
        username: "اسم المستخدم أو البريد",
        password: "كلمة المرور",
        forgot: "نسيت كلمة المرور؟",
        button: "دخول",
        langTxt: "عربية",
        contact: "اتصل بنا",
        errorEmpty: "يرجى ملء جميع الحقول.",
        errorWrong: "بيانات خاطئة. حاول مجدداً."
      }
    };

    // Identifiants demo (à remplacer par Notion Auth plus tard)
    const DEMO_USERS = [
      { username: "omar", password: "oragri2026" },
      { username: "admin", password: "admin" },
      { username: "omaragriofficiel@gmail.com", password: "oragri2026" }
    ];

    let lang = localStorage.getItem("oragri-lang") || "fr";

    function applyLang() {
      const t = i18n[lang];
      const isAr = lang === "ar";
      document.documentElement.dir = isAr ? "rtl" : "ltr";
      document.documentElement.lang = isAr ? "ar" : "fr";
      document.getElementById("title").textContent = t.title;
      document.getElementById("username").placeholder = t.username;
      document.getElementById("password").placeholder = t.password;
      document.getElementById("forgot").textContent = t.forgot;
      document.getElementById("loginBtn").textContent = t.button;
      document.getElementById("langTxt").textContent = t.langTxt;
      document.getElementById("contactTxt").textContent = t.contact;
      document.querySelectorAll(".switch button").forEach(btn =>
        btn.classList.toggle("active", btn.dataset.lang === lang)
      );
    }

    document.querySelectorAll(".switch button").forEach(btn => {
      btn.addEventListener("click", () => {
        lang = btn.dataset.lang;
        localStorage.setItem("oragri-lang", lang);
        applyLang();
      });
    });

    // Toggle mot de passe
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    togglePassword.addEventListener("click", () => {
      const hidden = passwordInput.type === "password";
      passwordInput.type = hidden ? "text" : "password";
      togglePassword.textContent = hidden ? "🙈" : "👁";
    });

    // Login handler
    document.getElementById("loginBtn").addEventListener("click", () => {
      const t = i18n[lang];
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.classList.remove("show");

      if (!user || !pass) {
        errorMsg.textContent = t.errorEmpty;
        errorMsg.classList.add("show");
        return;
      }

      const valid = DEMO_USERS.find(u => u.username === user && u.password === pass);
      if (valid) {
        localStorage.setItem("oragri-auth", "true");
        localStorage.setItem("oragri-user", user);
        window.location.href = "selection.html";
      } else {
        errorMsg.textContent = t.errorWrong;
        errorMsg.classList.add("show");
      }
    });

    // Permettre Entrée pour soumettre
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("loginBtn").click();
    });

    applyLang();
  </script>
</body>
</html>
